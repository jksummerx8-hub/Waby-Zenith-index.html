<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頂峰之境 - 官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 全局深色設定 */
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; }
        
        /* 黑色毛玻璃卡片 */
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        /* 漸層藍色標題 */
        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 語系切換邏輯 */
        .lang-txt[data-en] { display: none; }
        .lang-en .lang-txt[data-zh] { display: none; }
        .lang-en .lang-txt[data-en] { display: inline-block; }
    </style>
</head>
<body class="antialiased">

    <!-- 導覽列 -->
    <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10 py-4 px-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-2xl font-bold text-gradient">頂峰之境</div>
        <nav class="flex items-center space-x-6">
            <button onclick="toggleLang()" id="langBtn" class="border border-blue-500 text-blue-400 px-4 py-1.5 rounded-full text-sm font-semibold hover:bg-blue-600 hover:text-white transition">English</button>
            <button onclick="handleDownload()" class="bg-gradient-to-r from-blue-600 to-blue-800 text-white px-5 py-2 rounded-full text-sm font-semibold transition">App Store</button>
        </nav>
    </header>

    <section class="max-w-5xl mx-auto text-center px-6 py-20">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-6 text-gradient">強大源於呼吸</h1>
        <p class="text-lg md:text-xl text-white max-w-3xl mx-auto mb-10 leading-relaxed">
            結合極致工藝與動態美學，開啟身心強化的「感官聖殿」。頂峰之境幫助您建立與大腦的連結，掌握放鬆的能力。
        </p>
        <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
            <button onclick="handleDownload()" class="bg-gradient-to-r from-blue-600 to-blue-800 text-white font-bold px-8 py-4 rounded-2xl transition hover:opacity-90">立即下載 iOS 版</button>
        </div>
    </section>

    <!-- 定價方案區 (已加入自動續訂字樣) -->
    <section class="py-16 px-6 max-w-7xl mx-auto border-t border-white/10">
        <h2 class="text-3xl font-bold text-center mb-12 text-blue-400">定價方案</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- 方案 1 -->
            <div class="glass-card rounded-3xl p-6">
                <h3 class="font-bold text-white">週訂閱（自動續訂）</h3>
                <div class="text-2xl font-extrabold text-blue-400 my-4">NT$ 150</div>
                <button onclick="handleDownload()" class="w-full bg-blue-600 text-white py-2 rounded-xl">立即訂閱</button>
            </div>

            <!-- 方案 2 -->
            <div class="glass-card rounded-3xl p-6">
                <h3 class="font-bold text-white">月費方案（自動續訂）</h3>
                <div class="text-2xl font-extrabold text-blue-400 my-4">NT$ 390</div>
                <button onclick="handleDownload()" class="w-full bg-blue-600 text-white py-2 rounded-xl">立即訂閱</button>
            </div>

            <!-- 方案 3 -->
            <div class="glass-card rounded-3xl p-6">
                <h3 class="font-bold text-white">半年方案（自動續訂）</h3>
                <div class="text-2xl font-extrabold text-blue-400 my-4">NT$ 1490</div>
                <button onclick="handleDownload()" class="w-full bg-blue-600 text-white py-2 rounded-xl">立即訂閱</button>
            </div>

            <!-- 極致通行證 (無自動續訂) -->
            <div class="glass-card rounded-3xl p-6 border-blue-500">
                <h3 class="font-bold text-blue-400">極致通行證</h3>
                <div class="text-2xl font-extrabold text-white my-4">NT$ 2990</div>
                <button onclick="handleDownload()" class="w-full bg-white text-black py-2 rounded-xl font-bold">立即擁有</button>
            </div>

        </div>
    </section>

    <footer class="text-center py-10 text-slate-500 text-sm">
        © 2026 頂峰之境. All rights reserved. Developers:Hsu,Hao-Lun;
    </footer>

    <script>
        function toggleLang() {
            document.body.classList.toggle('lang-en');
            const btn = document.getElementById('langBtn');
            btn.innerText = document.body.classList.contains('lang-en') ? '中文' : 'English';
        }
        function handleDownload() {
            alert('頂峰之境目前支援 iOS，請前往 App Store 下載。');
        }
    </script>
</body>
</html>
