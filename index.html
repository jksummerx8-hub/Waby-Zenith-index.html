<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頂峰之境 - 官方網站 | Official Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 【視覺調整】精心調配的暗黑系毛玻璃效果面板 */
        .glass-card {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        /* 流暢的漸變與縮放動畫 */
        .modal-transition {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col justify-between overflow-x-hidden relative selection:bg-blue-600 selection:text-white">

    <div class="fixed top-[-20%] left-[-10%] w-[60vw] h-[60vw] bg-blue-900/15 rounded-full blur-[140px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] bg-indigo-900/15 rounded-full blur-[140px] pointer-events-none z-0"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-16 relative z-10">
        <div class="glass-card max-w-xl w-full rounded-3xl p-8 md:p-12 text-center shadow-2xl">
            
            <div class="flex justify-center mb-6">
                <svg class="w-16 h-16 text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-10.5l8.5 8.5 8.5-8.5M6.75 12h10.5" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19.5V16.5a3 3 0 016 0v3M12 3v3m0 0l-1.5-1.5M12 6l1.5-1.5" />
                </svg>
            </div>

            <h1 class="text-4xl md:text-5xl font-black tracking-wider mb-6 bg-gradient-to-r from-blue-400 via-blue-500 to-indigo-500 bg-clip-text text-transparent">
                頂峰之境
            </h1>

            <p class="text-white text-base md:text-lg leading-relaxed mb-10 opacity-90 max-w-md mx-auto">
                沉浸式的靜心與極致體驗。帶領您走向內心的最高峰，探索無限可能。請選擇下方選項開啟您的專屬旅程。
            </p>

            <div class="space-y-4 max-w-sm mx-auto">
                
                <button onclick="openModal('appstore')" class="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold py-4 px-6 rounded-xl transition duration-300 shadow-lg transform active:scale-[0.98]">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.7-1.13 1.84-.99 2.94.1.08 2.16.87 2.82-1.33z"/>
                    </svg>
                    App Store 下載
                </button>

                <button onclick="openModal('ios')" class="w-full flex items-center justify-center gap-3 bg-white/10 hover:bg-white/15 text-white font-semibold py-4 px-6 rounded-xl border border-white/20 transition duration-300 transform active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    iOS App 下載
                </button>

                <button onclick="openModal('subscription')" class="w-full flex items-center justify-center gap-3 bg-white/5 hover:bg-white/10 text-white font-semibold py-4 px-6 rounded-xl border border-white/10 transition duration-300 transform active:scale-[0.98]">
                    <svg class="w-5 h-5 text-yellow-400 drop-shadow-[0_0_8px_rgba(234,179,8,0.4)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                    </svg>
                    查看所有訂閱方案
                </button>

            </div>
        </div>
    </main>

    <footer class="text-center py-6 text-xs text-gray-500 relative z-10">
        &copy; 2026 頂峰之境. 保留所有權利。
    </footer>

    <div id="customModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md modal-transition opacity-0">
        
        <div class="glass-card max-w-md w-full rounded-2xl p-6 relative shadow-2xl transform scale-95 modal-transition text-center">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition duration-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <div id="modalIcon" class="flex justify-center mb-4"></div>
            
            <h3 id="modalTitle" class="text-xl font-bold text-white mb-3 tracking-wide"></h3>
            
            <div id="modalBody" class="text-gray-300 text-sm leading-relaxed mb-6"></div>

            <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-4 rounded-xl transition duration-200 shadow-md">
                好 的
            </button>
        </div>
    </div>

    <script>
        // 定義三個按鈕點擊後，彈出視窗各自對應的精美圖示與文案內容
        const modalData = {
            appstore: {
                title: "App Store 商店頁面",
                icon: `<svg class="w-16 h-16 text-blue-500 fill-current drop-shadow-[0_0_10px_rgba(59,130,246,0.3)]" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-.96.04-2.13.64-2.82 1.45-.6.7-1.13 1.84-.99 2.94.1.08 2.16.87 2.82-1.33z"/></svg>`,
                body: "感謝您的支持！系統正在引導您前往 Apple App Store 官方商店。您也可以隨時在 iPhone 的 App Store 中直接搜尋「頂峰之境」完成下載與會員開通。"
            },
            ios: {
                title: "iOS App 下載中心",
                icon: `<svg class="w-16 h-16 text-blue-400 drop-shadow-[0_0_10px_rgba(96,165,250,0.3)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>`,
                body: "頂峰之境目前全面支援 iOS 系統。正在為您的裝置安全調配安裝包，請在後續彈出的系統提示中點擊確認以完成安裝。"
            },
            subscription: {
                title: "頂峰之境 尊榮訂閱方案",
                icon: `<svg class="w-16 h-16 text-yellow-400 drop-shadow-[0_0_12px_rgba(234,179,8,0.4)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>`,
                body: `<div class="text-left space-y-2 mt-2 bg-white/5 p-4 rounded-xl border border-white/10">
                        <p class="flex items-center gap-2"><span class="text-yellow-400">✦</span> <strong>月度靜心體驗：</strong>每月 NT$ 150</p>
                        <p class="flex items-center gap-2"><span class="text-yellow-400">✦</span> <strong>年度精選通行：</strong>每年 NT$ 1,190</p>
                        <p class="flex items-center gap-2"><span class="text-yellow-400">✦</span> <strong>終身極致通行證：</strong>永久 NT$ 2,990</p>
                        <p class="text-xs text-gray-400 mt-2 pt-2 border-t border-white/10">※ 註：購買任何方案皆享 7 天無條件免費試用。</p>
                       </div>`
            }
        };

        // 執行：開啟彈出視窗
        function openModal(type) {
            const modal = document.getElementById('customModal');
            const card = modal.querySelector('.glass-card');
            const data = modalData[type];
            
            if (!data) return;

            // 注入對應的內容
            document.getElementById('modalIcon').innerHTML = data.icon;
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalBody').innerHTML = data.body;

            // 顯示結構並啟用動畫
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            }, 20);
        }

        // 執行：關閉彈出視窗
        function closeModal() {
            const modal = document.getElementById('customModal');
            const card = modal.querySelector('.glass-card');
            
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 250);
        }

        // 優化體驗：點擊彈出視窗黑色半透明背景處也能自動關閉
        document.getElementById('customModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
